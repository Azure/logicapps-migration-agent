parameters:
    - name: publishVersion
      type: string

steps:
    - script: npm version ${{ parameters.publishVersion }} --no-git-tag-version --allow-same-version
      displayName: 'Update version in package.json'
      workingDirectory: $(working_directory)
      condition: succeeded()

    - script: npx @vscode/vsce package --no-dependencies
      displayName: 'Package VSIX'
      workingDirectory: $(working_directory)
      condition: succeeded()
