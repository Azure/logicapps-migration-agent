steps:
    - task: Npm@1
      displayName: 'Lint'
      inputs:
          command: custom
          customCommand: 'run lint'
          workingDir: $(working_directory)
      condition: succeeded()

    - task: Npm@1
      displayName: 'Build'
      inputs:
          command: custom
          customCommand: 'run build'
          workingDir: $(working_directory)
      condition: succeeded()