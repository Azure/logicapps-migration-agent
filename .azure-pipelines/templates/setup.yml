steps:
    - task: NodeTool@0
      displayName: 'Setup Node.js'
      inputs:
          versionSpec: '20.x'
      condition: succeeded()

    - pwsh: |
          # Remove pnpm-specific .npmrc so npm ci does not choke on unknown keys
          $npmrc = Join-Path '$(Build.SourcesDirectory)' '.npmrc'
          if (Test-Path $npmrc) {
              Rename-Item $npmrc '.npmrc.pnpm' -Force
              Write-Host "Renamed .npmrc to .npmrc.pnpm (contains pnpm-specific settings)"
          }

          # Strip the packageManager field so npm 10+ does not refuse to run
          $pkg = Join-Path '$(Build.SourcesDirectory)' 'package.json'
          $json = Get-Content $pkg -Raw | ConvertFrom-Json
          if ($json.PSObject.Properties['packageManager']) {
              $json.PSObject.Properties.Remove('packageManager')
              $json | ConvertTo-Json -Depth 100 | Set-Content $pkg -Encoding utf8NoBOM
              Write-Host "Removed packageManager field from package.json"
          }
      displayName: 'Prepare for npm ci (remove pnpm-specific config)'
      condition: succeeded()

    - task: Npm@1
      displayName: 'Install dependencies'
      inputs:
          command: ci
          workingDir: $(working_directory)
      condition: succeeded()