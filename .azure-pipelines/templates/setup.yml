steps:
    - task: NodeTool@0
      displayName: 'Setup Node.js'
      inputs:
          versionSpec: '20.x'
      condition: succeeded()

    - powershell: |
          # Remove pnpm .npmrc to avoid unknown config keys with npm
          $npmrc = Join-Path '$(Build.SourcesDirectory)' '.npmrc'
          if (Test-Path $npmrc) {
              Rename-Item $npmrc '.npmrc.pnpm' -Force
              Write-Host "Renamed .npmrc to .npmrc.pnpm (pnpm-specific)"
          }
      displayName: 'Remove pnpm .npmrc'
      condition: succeeded()

    - task: Npm@1
      displayName: 'Install dependencies'
      inputs:
          command: install
          workingDir: $(working_directory)
          customRegistry: useFeed
          customFeed: DevDiv/CodeToCloud