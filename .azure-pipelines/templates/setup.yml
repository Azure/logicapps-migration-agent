steps:
    - task: NodeTool@0
      displayName: 'Setup Node.js'
      inputs:
          versionSpec: '20.x'
      condition: succeeded()

    - pwsh: |
          $packageManager = (Get-Content -Raw -Path "$(Build.SourcesDirectory)\package.json" | ConvertFrom-Json).packageManager
          if ($packageManager -and $packageManager.StartsWith('pnpm@')) {
              $pnpmVersion = $packageManager.Substring(5).Split('+')[0]
              Write-Output "##vso[task.setvariable variable=dependencyInstaller]pnpm"
              Write-Output "##vso[task.setvariable variable=pnpmVersion]$pnpmVersion"
              Write-Host "Using pnpm $pnpmVersion from package.json"
          } else {
              Write-Output "##vso[task.setvariable variable=dependencyInstaller]npm"
              Write-Host "package.json does not declare pnpm; falling back to npm install for this release tag."
          }
      displayName: 'Resolve dependency installer'
      condition: succeeded()

    - pwsh: |
          $registry = '$(CI_NPM_REGISTRY_URL)'
          if (-not $registry -or $registry -match '^\$\([^)]+\)$') {
              $registry = 'https://registry.npmjs.org/'
          }
          if (-not $registry.EndsWith('/')) {
              $registry += '/'
          }

          $ciNpmrc = '$(Agent.TempDirectory)\ci.npmrc'
          $repoNpmrc = Join-Path '$(Build.SourcesDirectory)' '.npmrc'
          $lines = @(
              "registry=$registry"
          )

          if (Test-Path $repoNpmrc) {
              $lines += Get-Content $repoNpmrc
          }

          Set-Content -Path $ciNpmrc -Value $lines -Encoding utf8
          Write-Host "Created CI .npmrc at $ciNpmrc"
          Get-Content $ciNpmrc
      displayName: 'Configure npm registry'
      condition: succeeded()

    - task: npmAuthenticate@0
      displayName: 'Authenticate npm'
      inputs:
          workingFile: '$(Agent.TempDirectory)\ci.npmrc'
      condition: succeeded()

    - task: Npm@1
      displayName: 'Install pnpm'
      inputs:
          command: custom
          customCommand: 'install -g pnpm@$(pnpmVersion)'
      condition: and(succeeded(), eq(variables['dependencyInstaller'], 'pnpm'))

    - script: pnpm install --frozen-lockfile
      displayName: 'Install dependencies'
      workingDirectory: $(working_directory)
      condition: and(succeeded(), eq(variables['dependencyInstaller'], 'pnpm'))
      env:
          NPM_CONFIG_USERCONFIG: $(Agent.TempDirectory)\ci.npmrc

    - script: npm install --no-audit --no-fund
      displayName: 'Install dependencies'
      workingDirectory: $(working_directory)
      condition: and(succeeded(), eq(variables['dependencyInstaller'], 'npm'))
      env:
          NPM_CONFIG_USERCONFIG: $(Agent.TempDirectory)\ci.npmrc
