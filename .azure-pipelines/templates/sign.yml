parameters:
    - name: enableSigning
      type: boolean
      default: true

steps:
    # Check if the SignExtension.signproj file exists
    - powershell: |
          $fileExists = Test-Path -Path "$(Build.SourcesDirectory)/.azure-pipelines/SignExtension.signproj"
          Write-Output "##vso[task.setvariable variable=signprojExists]$fileExists"

          if ($fileExists) {
              Write-Output "SignExtension.signproj file found. Signing extension."
          } else {
              Write-Output "SignExtension.signproj file not found. Skipping signing."
          }
      displayName: 'Check for SignExtension.signproj'
      condition: and(succeeded(), eq(${{ parameters.enableSigning }}, true))

    # Get extension info from package.json
    - pwsh: |
          Write-Output "##vso[task.setvariable variable=name;isOutput=true]$((Get-Content -Raw -Path package.json | ConvertFrom-Json).name)"
          Write-Output "##vso[task.setvariable variable=version;isOutput=true]$((Get-Content -Raw -Path package.json | ConvertFrom-Json).version)"
      condition: and(succeeded(), eq(variables['signprojExists'], True))
      name: package
      displayName: 'Get extension info from package.json'

    # Generate VSIX manifest for signing
    - script: npx @vscode/vsce generate-manifest -i $(package.name)-$(package.version).vsix -o $(Build.SourcesDirectory)/extension.manifest
      condition: and(succeeded(), eq(variables['signprojExists'], True))
      displayName: 'Generate extension manifest'

    # Write NuGet.Config dynamically (committed file is lost after tag checkout)
    - powershell: |
          $nugetConfig = @'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="DevDiv_PublicPackages" value="https://pkgs.dev.azure.com/devdiv/DevDiv/_packaging/DevDiv_PublicPackages/nuget/v3/index.json" />
            </packageSources>
          </configuration>
          '@
          Set-Content -Path "$(Build.SourcesDirectory)/NuGet.Config" -Value $nugetConfig
          Write-Host "Created NuGet.Config pointing to DevDiv_PublicPackages feed"
      condition: and(succeeded(), eq(variables['signprojExists'], True))
      displayName: 'Create NuGet.Config for ADO feed'

    # Authenticate to ADO NuGet feed for Microsoft.Build.NoTargets SDK
    - task: NuGetAuthenticate@1
      condition: and(succeeded(), eq(variables['signprojExists'], True))
      displayName: 'Authenticate NuGet feeds'

    # Sign the extension
    - task: DotNetCoreCLI@2
      condition: and(succeeded(), eq(variables['signprojExists'], True))
      displayName: 'Sign with MSBuild'
      inputs:
          command: 'build'
          projects: $(Build.SourcesDirectory)/.azure-pipelines/SignExtension.signproj

    # Verify signature file was created
    - pwsh: |
          $filePath = "extension.signature.p7s"

          if (-Not (Test-Path $filePath)) {
              Write-Error "The file '$filePath' does not exist."
              exit 1
          }

          Write-Output "The file '$filePath' exists."
          exit 0
      displayName: 'Verify extension.signature.p7s'
      condition: and(succeeded(), eq(variables['signprojExists'], True))