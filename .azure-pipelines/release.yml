# Release Pipeline for Logic Apps Migration Agent
# Publishes the signed VSIX to the VS Code Marketplace
trigger: none

parameters:
    - name: publishVersion
      displayName: Version to publish
      type: string
    - name: dryRun
      displayName: Dry run
      type: boolean
      default: true

resources:
    pipelines:
        - pipeline: build
          source: \Azure Tools\VSCode\Extensions\vscode-logicappsmigrationagent
    repositories:
        - repository: azExtTemplates
          type: github
          name: microsoft/vscode-azuretools
          ref: main
          endpoint: GitHub-AzureTools

variables:
    - name: TeamName
      value: 'Azure Logic Apps Migration Agent'

extends:
    template: azure-pipelines/release-extension.yml@azExtTemplates
    parameters:
        pipelineID: $(resources.pipeline.build.pipelineID)
        runID: $(resources.pipeline.build.runID)
        publishVersion: ${{ parameters.publishVersion }}
        dryRun: ${{ parameters.dryRun }}
        environmentName: VSCodeDeployMigrationAssistant
